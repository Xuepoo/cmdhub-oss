# Continuous Integration for CmdHub OSS (Rust workspace)
# Runs on every push to main and on pull requests
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-Dwarnings"

jobs:
  fmt:
    name: Rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --all-targets --all-features -- -D warnings

  test:
    name: Test
    runs-on: ubuntu-latest
    env:
      # Tests spawn many `cmdh` subprocesses; without a pre-fetched model each
      # one would race to download the 127MB embedding model to the same path,
      # deadlocking the suite. Point every subprocess at one cached copy.
      CMDH_MODEL_PATH: ${{ github.workspace }}/.cache-model/model.onnx
      # Pinned SHA-256 of bge-small-en-v1.5 (must match installer.rs default).
      CMDH_MODEL_SHA256: 828e1496d7fabb79cfa4dcd84fa38625c0d3d21da474a00f08db0f559940cf35
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Cache embedding model
        id: model-cache
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/.cache-model
          key: cmdh-model-${{ env.CMDH_MODEL_SHA256 }}
      - name: Fetch embedding model
        if: steps.model-cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p "${{ github.workspace }}/.cache-model"
          curl -fsSL https://cdn.cmdhub.org/models/bge-micro-v2.onnx \
            -o "$CMDH_MODEL_PATH"
      - name: Verify embedding model integrity
        # Always runs, so a poisoned cache entry is rejected too, not just a
        # fresh download. On mismatch, delete the file and fail the job.
        run: |
          if ! echo "$CMDH_MODEL_SHA256  $CMDH_MODEL_PATH" | sha256sum -c -; then
            rm -f "$CMDH_MODEL_PATH"
            echo "::error::Embedding model SHA-256 mismatch — refusing to run tests"
            exit 1
          fi
      - run: cargo test --all-features --workspace

  docs:
    name: Documentation
    runs-on: ubuntu-latest
    env:
      RUSTDOCFLAGS: "-Dwarnings"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo doc --no-deps --all-features --workspace

  # Ensure ACI JSON Schema examples are valid
  schema-lint:
    name: Schema Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate JSON Schema files
        run: |
          find . -name '*.json' -path '*/schemas/*' | while read f; do
            python3 -m json.tool "$f" > /dev/null || exit 1
          done

  typos:
    name: Typos
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: crate-ci/typos@v1.47.2
