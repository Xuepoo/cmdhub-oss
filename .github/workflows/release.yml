# Release pipeline for cmdh CLI
# Triggers on version tags (v*) and handles:
#   - Cross-compilation for 6 targets (Linux/macOS x glibc/musl/aarch64)
#   - GitHub Release with checksums
#   - crates.io publish
name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

env:
  PROJECT_NAME: cmdh

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            cross: true
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            cross: true
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            cross: true
            artifact_name: cmdh-linux-x86_64
            pack_linux: true
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            cross: true
            artifact_name: cmdh-linux-aarch64
            pack_linux: true
          - target: x86_64-apple-darwin
            os: macos-latest
            cross: false
          - target: aarch64-apple-darwin
            os: macos-latest
            cross: false

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install cross
        if: matrix.cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build release binary
        shell: bash
        run: |
          if [ "${{ matrix.cross }}" = "true" ]; then
            cross build --release --locked --target ${{ matrix.target }} -p cmdhub-cli
          else
            cargo build --release --locked --target ${{ matrix.target }} -p cmdhub-cli
          fi

      - name: Package archive
        shell: bash
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../${PROJECT_NAME}-${{ github.ref_name }}-${{ matrix.target }}.tar.gz cmdh

      - name: Generate SHA256 checksum
        shell: bash
        run: |
          sha256sum ${PROJECT_NAME}-${{ github.ref_name }}-${{ matrix.target }}.tar.gz \
            > ${PROJECT_NAME}-${{ github.ref_name }}-${{ matrix.target }}.tar.gz.sha256

      - name: Rename release binary
        if: matrix.artifact_name
        shell: bash
        run: |
          cp target/${{ matrix.target }}/release/cmdh ${{ matrix.artifact_name }}
          chmod +x ${{ matrix.artifact_name }}

      - name: Package for Linux distributions
        if: matrix.pack_linux
        shell: bash
        run: |
          RUNNER_ARCH=$(uname -m)
          if [ "$RUNNER_ARCH" = "aarch64" ]; then
            NFPM_ARCH="arm64"
          else
            NFPM_ARCH="x86_64"
          fi

          if [[ "${{ matrix.target }}" == aarch64* ]]; then
            export ARCH="arm64"
            PKG_ARCH="aarch64"
          else
            export ARCH="amd64"
            PKG_ARCH="x86_64"
          fi

          curl -sL https://github.com/goreleaser/nfpm/releases/download/v2.37.1/nfpm_2.37.1_Linux_${NFPM_ARCH}.tar.gz | tar xz nfpm

          cp target/${{ matrix.target }}/release/cmdh ./cmdh
          chmod +x ./cmdh

          VERSION=${GITHUB_REF_NAME#v}
          if [ -z "$VERSION" ]; then
            VERSION="0.1.0"
          fi
          export VERSION

          ./nfpm pkg --config packaging/nfpm.yaml --packager deb --target cmdh-linux-${PKG_ARCH}.deb
          ./nfpm pkg --config packaging/nfpm.yaml --packager rpm --target cmdh-linux-${PKG_ARCH}.rpm
          ./nfpm pkg --config packaging/nfpm.yaml --packager archlinux --target cmdh-linux-${PKG_ARCH}.pkg.tar.zst

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: build-${{ matrix.target }}
          path: |
            ${{ env.PROJECT_NAME }}-*.tar.gz
            ${{ env.PROJECT_NAME }}-*.sha256
            cmdh-linux-*
            *.deb
            *.rpm
            *.pkg.tar.zst
          if-no-files-found: warn

  release:
    name: GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: build-*
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-crates:
    name: Publish to crates.io
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Publish cmdhub-shared
        run: cargo publish --locked -p cmdhub-shared
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
      - name: Publish cmdhub-cli
        run: cargo publish --locked -p cmdhub-cli
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
      - name: Publish cmdhub-mcp
        run: cargo publish --locked -p cmdhub-mcp
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  # Update AUR package
  # ---------------------------------------------------------------------------
  publish-aur:
    name: Update AUR Package
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download Linux artifact checksum
        uses: actions/download-artifact@v4
        with:
          name: build-x86_64-unknown-linux-musl
          path: artifacts

      - name: Publish cmdh-bin to AUR
        uses: KSXGitHub/github-actions-deploy-aur@v3
        with:
          pkgname: cmdh-bin
          pkgbuild: ./packaging/aur/PKGBUILD
          commit_username: Xuepoo
          commit_email: xuepoo@users.noreply.github.com
          ssh_private_key: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
          commit_message: "chore: update to ${{ github.ref_name }}"
