# Release pipeline for cmdh CLI
# Triggers on version tags (v*) and handles:
#   - Cross-compilation for 6 targets (Linux/macOS x glibc/musl/aarch64)
#   - GitHub Release with checksums
#   - crates.io publish
name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

env:
  PROJECT_NAME: cmdh
  CFLAGS: "-Du_int8_t=uint8_t -Du_int16_t=uint16_t -Du_int32_t=uint32_t -Du_int64_t=uint64_t"

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            cross: true
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            cross: true
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            cross: true
            artifact_name: cmdh-linux-x86_64
            pack_linux: true
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            cross: true
            artifact_name: cmdh-linux-aarch64
            pack_linux: true
          - target: x86_64-apple-darwin
            os: macos-latest
            cross: false
          - target: aarch64-apple-darwin
            os: macos-latest
            cross: false
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            cross: false

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install cross
        if: matrix.cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build release binary with cross
        if: matrix.cross
        run: cross build --release --locked --target ${{ matrix.target }} -p cmdhub-cli

      - name: Build release binary with cargo
        if: ${{ !matrix.cross }}
        run: cargo build --release --locked --target ${{ matrix.target }} -p cmdhub-cli

      - name: Package archive (Windows)
        if: contains(matrix.target, 'windows')
        shell: bash
        run: |
          cd "target/${{ matrix.target }}/release"
          7z a "../../../${PROJECT_NAME}-${{ github.ref_name }}-${{ matrix.target }}.zip" cmdh.exe

      - name: Package archive (Unix)
        if: "!contains(matrix.target, 'windows')"
        shell: bash
        run: |
          cd "target/${{ matrix.target }}/release"
          tar czf "../../../${PROJECT_NAME}-${{ github.ref_name }}-${{ matrix.target }}.tar.gz" cmdh

      - name: Generate SHA256 checksum (Windows)
        if: contains(matrix.target, 'windows')
        shell: bash
        run: |
          sha256sum "${PROJECT_NAME}-${{ github.ref_name }}-${{ matrix.target }}.zip" \
            > "${PROJECT_NAME}-${{ github.ref_name }}-${{ matrix.target }}.zip.sha256"

      - name: Generate SHA256 checksum (Unix)
        if: "!contains(matrix.target, 'windows')"
        shell: bash
        run: |
          sha256sum "${PROJECT_NAME}-${{ github.ref_name }}-${{ matrix.target }}.tar.gz" \
            > "${PROJECT_NAME}-${{ github.ref_name }}-${{ matrix.target }}.tar.gz.sha256"

      - name: Rename release binary
        if: matrix.artifact_name
        shell: bash
        run: |
          cp target/${{ matrix.target }}/release/cmdh ${{ matrix.artifact_name }}
          chmod +x ${{ matrix.artifact_name }}

      - name: Package for Linux distributions
        if: matrix.pack_linux
        shell: bash
        run: |
          RUNNER_ARCH=$(uname -m)
          if [ "$RUNNER_ARCH" = "aarch64" ]; then
            NFPM_ARCH="arm64"
          else
            NFPM_ARCH="x86_64"
          fi

          TARGET="${{ matrix.target }}"
          if [[ "$TARGET" == aarch64* ]]; then
            export ARCH="arm64"
            PKG_ARCH="aarch64"
          else
            export ARCH="amd64"
            PKG_ARCH="x86_64"
          fi

          curl -sL https://github.com/goreleaser/nfpm/releases/download/v2.37.1/nfpm_2.37.1_Linux_${NFPM_ARCH}.tar.gz | tar xz nfpm

          cp target/${{ matrix.target }}/release/cmdh ./cmdh
          chmod +x ./cmdh

          VERSION=${GITHUB_REF_NAME#v}
          if [ -z "$VERSION" ]; then
            VERSION="0.1.0"
          fi
          export VERSION

          ./nfpm pkg --config packaging/nfpm.yaml --packager deb --target cmdh-linux-${PKG_ARCH}.deb
          ./nfpm pkg --config packaging/nfpm.yaml --packager rpm --target cmdh-linux-${PKG_ARCH}.rpm
          ./nfpm pkg --config packaging/nfpm.yaml --packager archlinux --target cmdh-linux-${PKG_ARCH}.pkg.tar.zst

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: build-${{ matrix.target }}
          path: |
            ${{ env.PROJECT_NAME }}-*.tar.gz
            ${{ env.PROJECT_NAME }}-*.zip
            ${{ env.PROJECT_NAME }}-*.sha256
            cmdh-linux-*
            *.deb
            *.rpm
            *.pkg.tar.zst
          if-no-files-found: warn

  release:
    name: GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          pattern: build-*
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: artifacts/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-crates:
    name: Publish to crates.io
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Publish cmdhub-shared
        run: cargo publish --locked -p cmdhub-shared 2>&1 | tee cargo_publish.log || grep -q "already exists" cargo_publish.log
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
      - name: Publish cmdhub-skills
        run: cargo publish --locked -p cmdhub-skills 2>&1 | tee cargo_publish.log || grep -q "already exists" cargo_publish.log
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
      - name: Publish cmdhub-cli
        run: cargo publish --locked -p cmdhub-cli 2>&1 | tee cargo_publish.log || grep -q "already exists" cargo_publish.log
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
      - name: Publish cmdhub-mcp
        run: cargo publish --locked -p cmdhub-mcp 2>&1 | tee cargo_publish.log || grep -q "already exists" cargo_publish.log
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  # Update AUR package
  # ---------------------------------------------------------------------------
  publish-aur:
    name: Update AUR Package
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all build artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          pattern: build-*
          merge-multiple: true

      - name: Update PKGBUILD package version and checksums
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          SHA_X86=$(sha256sum "artifacts/cmdh-linux-x86_64" | awk '{print $1}')
          SHA_ARM=$(sha256sum "artifacts/cmdh-linux-aarch64" | awk '{print $1}')

          sed -i "s/pkgver=.*/pkgver=${VERSION}/" ./packaging/aur/PKGBUILD
          sed -i "s/sha256sums_x86_64=.*/sha256sums_x86_64=('${SHA_X86}')/" ./packaging/aur/PKGBUILD
          sed -i "s/sha256sums_aarch64=.*/sha256sums_aarch64=('${SHA_ARM}')/" ./packaging/aur/PKGBUILD

      - name: Publish cmdh-bin to AUR
        uses: KSXGitHub/github-actions-deploy-aur@v3
        with:
          pkgname: cmdh-bin
          pkgbuild: ./packaging/aur/PKGBUILD
          commit_username: Xuepoo
          commit_email: xuepoo@users.noreply.github.com
          ssh_private_key: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
          commit_message: "chore: update to ${{ github.ref_name }}"

  # Update Homebrew tap
  # ---------------------------------------------------------------------------
  publish-homebrew:
    name: Update Homebrew Tap
    needs: release
    runs-on: ubuntu-latest
    env:
      HOMEBREW_TAP: Xuepoo/homebrew-tap
      PROJECT_NAME: cmdh
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          pattern: build-*
          merge-multiple: true

      - name: Extract checksums
        id: checksums
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          SHA_LINUX=$(awk '{print $1}' "artifacts/${PROJECT_NAME}-${GITHUB_REF_NAME}-x86_64-unknown-linux-gnu.tar.gz.sha256")
          SHA_MACOS_X86=$(awk '{print $1}' "artifacts/${PROJECT_NAME}-${GITHUB_REF_NAME}-x86_64-apple-darwin.tar.gz.sha256")
          SHA_MACOS_ARM=$(awk '{print $1}' "artifacts/${PROJECT_NAME}-${GITHUB_REF_NAME}-aarch64-apple-darwin.tar.gz.sha256")

          {
            echo "version=${VERSION}"
            echo "sha_linux=${SHA_LINUX}"
            echo "sha_macos_x86=${SHA_MACOS_X86}"
            echo "sha_macos_arm=${SHA_MACOS_ARM}"
          } >> "$GITHUB_OUTPUT"

      - name: Clone and update tap
        run: |
          VERSION="${{ steps.checksums.outputs.version }}"
          REPO_URL="https://x-access-token:${{ secrets.HOMEBREW_TAP_TOKEN }}@github.com/${{ env.HOMEBREW_TAP }}.git"

          git clone "${REPO_URL}" tap
          cd tap

          mkdir -p Formula
          cat > "Formula/${PROJECT_NAME}.rb" << 'FORMULA'
          class Cmdh < Formula
            desc "CmdHub agent-computer interface CLI client"
            homepage "https://github.com/Xuepoo/cmdhub-oss"
            version "VERSION_PLACEHOLDER"
            license "MIT"

            on_macos do
              if Hardware::CPU.arm?
                url "https://github.com/Xuepoo/cmdhub-oss/releases/download/vVERSION_PLACEHOLDER/cmdh-vVERSION_PLACEHOLDER-aarch64-apple-darwin.tar.gz"
                sha256 "SHA_MACOS_ARM_PLACEHOLDER"
              else
                url "https://github.com/Xuepoo/cmdhub-oss/releases/download/vVERSION_PLACEHOLDER/cmdh-vVERSION_PLACEHOLDER-x86_64-apple-darwin.tar.gz"
                sha256 "SHA_MACOS_X86_PLACEHOLDER"
              end
            end

            on_linux do
              url "https://github.com/Xuepoo/cmdhub-oss/releases/download/vVERSION_PLACEHOLDER/cmdh-vVERSION_PLACEHOLDER-x86_64-unknown-linux-gnu.tar.gz"
              sha256 "SHA_LINUX_PLACEHOLDER"
            end

            def install
              bin.install "cmdh"
            end

            test do
              assert_match version.to_s, shell_output("#{bin}/cmdh --version")
            end
          end
          FORMULA

          # Replace placeholders
          sed -i "s/VERSION_PLACEHOLDER/${VERSION}/g" "Formula/${PROJECT_NAME}.rb"
          sed -i "s/SHA_MACOS_ARM_PLACEHOLDER/${{ steps.checksums.outputs.sha_macos_arm }}/g" "Formula/${PROJECT_NAME}.rb"
          sed -i "s/SHA_MACOS_X86_PLACEHOLDER/${{ steps.checksums.outputs.sha_macos_x86 }}/g" "Formula/${PROJECT_NAME}.rb"
          sed -i "s/SHA_LINUX_PLACEHOLDER/${{ steps.checksums.outputs.sha_linux }}/g" "Formula/${PROJECT_NAME}.rb"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "Formula/${PROJECT_NAME}.rb"
          git commit -m "chore: update ${PROJECT_NAME} to ${VERSION}"
          git push

  # Update Scoop bucket
  # ---------------------------------------------------------------------------
  publish-scoop:
    name: Update Scoop Bucket
    needs: release
    runs-on: ubuntu-latest
    env:
      SCOOP_BUCKET: Xuepoo/scoop-bucket
      PROJECT_NAME: cmdh
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          pattern: build-*
          merge-multiple: true

      - name: Update Scoop manifest
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          SHA_WIN=$(awk '{print $1}' "artifacts/${PROJECT_NAME}-${GITHUB_REF_NAME}-x86_64-pc-windows-msvc.zip.sha256")

          REPO_URL="https://x-access-token:${{ secrets.SCOOP_BUCKET_TOKEN }}@github.com/${{ env.SCOOP_BUCKET }}.git"
          git clone "${REPO_URL}" bucket
          cd bucket

          mkdir -p bucket
          cat > "bucket/${PROJECT_NAME}.json" << EOF
          {
            "version": "${VERSION}",
            "description": "CmdHub agent-computer interface CLI client",
            "homepage": "https://github.com/Xuepoo/cmdhub-oss",
            "license": "MIT",
            "architecture": {
              "64bit": {
                "url": "https://github.com/Xuepoo/cmdhub-oss/releases/download/v\${VERSION}/cmdh-v\${VERSION}-x86_64-pc-windows-msvc.zip",
                "hash": "\${SHA_WIN}",
                "bin": "cmdh.exe"
              }
            },
            "checkver": {
              "github": "https://github.com/Xuepoo/cmdhub-oss"
            },
            "autoupdate": {
              "architecture": {
                "64bit": {
                  "url": "https://github.com/Xuepoo/cmdhub-oss/releases/download/v\\\$version/cmdh-v\\\$version-x86_64-pc-windows-msvc.zip"
                }
              }
            }
          }
          EOF

          # Replace variables
          sed -i "s/\${VERSION}/${VERSION}/g" "bucket/${PROJECT_NAME}.json"
          sed -i "s/\${SHA_WIN}/${SHA_WIN}/g" "bucket/${PROJECT_NAME}.json"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "bucket/${PROJECT_NAME}.json"
          git commit -m "chore: update ${PROJECT_NAME} to ${VERSION}"
          git push
