# typos configuration — spell checker for source code
# https://github.com/crate-ci/typos
[files]
extend-exclude = [
  "CHANGELOG.md",
  "*.lock",
  "*.min.js",
  "*.min.css",
]

[default]
extend-ignore-re = [
  # content-addressed sha16 hashes in the probe-batch log (random hex may form
  # dictionary-like fragments, e.g. "...ede..." -> "edge"); ignore the whole token.
  "\\b[0-9a-f]{16}\\b",
]

[default.extend-words]
# Add project-specific false positives here
# e.g., ght = "ght"
cmdh = "cmdh"
cmdhub = "cmdhub"
aci = "aci"
fts = "fts"
rrf = "rrf"
pgvector = "pgvector"
sqlite_vec = "sqlite_vec"
mis = "mis"  # "mis-detects"/"mis-detected" — valid hyphenated prefix in the runbook
